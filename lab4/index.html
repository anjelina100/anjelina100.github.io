<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1> Sign Up Form </h1>
    <fieldset>
        <legend>Sign Up</legend>
        <form id="signupForm" action="welcome.html">
        First Name: <input type="text"><br>
        Last Name: <input type="text"><br>
        Email: <input type="text"><br>
        Phone Number:<input type="text"><br><br>
        Zip Code: <input id="zipCode" type="text"> <span id="zipError"></span><br>
        City: <span id = "city"></span>
        <br>
        Latitude:
        <span id = "latitude"></span>
        <br>
        Longitude:
        <span id = "longitude"></span>
        <br><br>
        State: 
        <select id = "state">
        </select><br>
        Select a County: <select id = "county"></select><br>

        Desired Username: <input id="user" type="text"> <span id="available"></span><br>
        Password: <input id="pass" type="password"> <span id = "suggestedPass"></span><br>
        Type Password Again: <input id = "pass2" type="password"> <span id="passwordError"></span><br>
        <input type="submit" value="Sign up!">
        </form>
    </fieldset>

    <script src="js/script.js"></script>



</body>

</html>
